<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パラメータ反映サイト</title>
    <!-- パラメータのCSSを流し込むための空のスタイルタグ -->
    <style id="custom-css"></style>
</head>
<body>
    <!-- パラメータのHTMLを流し込むための空のエリア -->
    <div id="custom-html"></div>

    <script>
        // 1. URLからパラメータを取得
        const params = new URLSearchParams(window.location.search);

        // 2. パラメータから各コードを抽出（値がなければデフォルトの文字）
        const htmlCode = params.get('html') || '<h1>サイトの初期状態</h1><p>URLにパラメータを付与してください。</p>';
        const cssCode  = params.get('css')  || 'body { font-family: sans-serif; padding: 20px; background: #fafafa; }';
        const jsCode   = params.get('js')   || 'console.log("初期JS実行中");';

        // 3. このサイト自身のHTMLとCSSを上書きする
        document.getElementById('custom-html').innerHTML = htmlCode;
        document.getElementById('custom-css').textContent = cssCode;

        // 4. このサイト自身のスクリプトとしてJSを実行する
        // (scriptタグのinnerHTMLに後から文字列を入れても実行されないため、要素を作って挿入します)
        if (params.get('js')) {
            const scriptTag = document.createElement('script');
            scriptTag.textContent = jsCode;
            document.body.appendChild(scriptTag);
        }
    </script>
</body>
</html>
