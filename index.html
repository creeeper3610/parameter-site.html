<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コード共有レンダラー</title>
    <style>
        /* 画面全体にコード実行結果（iframe）を表示するスタイル */
        html, body, iframe {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- パラメータのコードを展開して実行するための安全な隔離部屋（iframe） -->
    <iframe id="output"></iframe>

    <script>
        // 1. URLからパラメータ（?html=... など）を取得
        const params = new URLSearchParams(window.location.search);

        // 2. 各パラメータの値（コード文字列）を取り出す（空ならデフォルト値）
        const htmlCode = params.get('html') || '<h1>コードが指定されていません</h1><p>?html=... をURLに付けてください</p>';
        const cssCode  = params.get('css')  || 'body { font-family: sans-serif; text-align: center; margin-top: 50px; }';
        const jsCode   = params.get('js')   || 'console.log("No JS loaded");';

        // 3. 取得したコードを1つのHTMLドキュメントとして組み立てる
        const completeSource = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <style>${cssCode}<\/style>
            </head>
            <body>
                ${htmlCode}
                <script>${jsCode}<\/script>
            </body>
            </html>
        `;

        // 4. iframeの中に組み立てたHTMLを流し込んで実行する
        const iframe = document.getElementById('output');
        iframe.srcdoc = completeSource;
    </script>
</body>
</html>
